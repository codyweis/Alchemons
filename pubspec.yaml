name: alchemons
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.28.1
  path_provider: ^2.1.5
  json_annotation: ^4.9.0
  drift_flutter: ^0.2.5
  provider: ^6.1.5
  flame: ^1.30.1
  uuid: ^4.5.1
  lottie: ^3.3.1
  flutter_shaders: ^0.1.3
  google_fonts: ^6.3.2
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  shared_preferences: ^2.5.3
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  archive: ^4.0.7
  sensors_plus: ^7.0.0
  just_audio: ^0.9.36
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.28.1
  build_runner: ^2.6.0
  json_serializable: ^6.10.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"

  adaptive_icon_foreground: "assets/images/appicon.png"
  adaptive_icon_background: "#FFFFFF"
  
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/relics/
    - assets/animations/
    - assets/images/backgrounds/
    - assets/images/backgrounds/scenes/
    - assets/images/backgrounds/scenes/valley/
    - assets/images/backgrounds/scenes/volcano/
    - assets/images/backgrounds/scenes/swamp/
    - assets/images/backgrounds/scenes/sky/
    - assets/images/creatures/
    - assets/images/creatures/common/
    - assets/images/creatures/uncommon/
    - assets/images/creatures/rare/
    - assets/images/creatures/legendary/
    - assets/images/creatures/mystic/
    - assets/images/ui/
    - assets/data/
    - assets/audio/music/
    - assets/audio/sounds/

  shaders:
  - assets/shaders/fire.frag
